version: "3.8"
services:
  plane-pm-agent:
    build: .
    container_name: plane-pm-agent
    restart: always
    environment:
      - PLANE_PAT=${PLANE_PAT:-plane_api_ac571e3e4b80488fac8d6d45d679da75}
      - PLANE_WORKSPACE_SLUG=${PLANE_WORKSPACE_SLUG:-kcbdev}
      - PLANE_PROJECT_ID=${PLANE_PROJECT_ID:-3b5bd197-028c-4884-a304-011f088694e2}
      - PLANE_BASE_URL=${PLANE_BASE_URL:-https://plane.kcb.ma}
    ports:
      - "8212:8212"
    networks:
      - plane-pm-net

networks:
  plane-pm-net:
    name: plane-pm-net
    driver: bridge